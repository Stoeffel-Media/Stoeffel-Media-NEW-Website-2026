<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Stoeffel-Media</title>
  <meta name="description" content="This page doesn't exist. Head back to Stoeffel-Media — Sydney design studio for web design, graphic design and digital marketing." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://stoeffel-media.com.au/404.html" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png" />
  <meta name="theme-color" content="#202020" />
  <link rel="preload" href="fonts/outfit-latin.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
  <link rel="preload" href="fonts/outfit-latin-ext.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .e404-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      position: relative;
      overflow: hidden;
    }

    .e404-bg-number {
      position: absolute;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(280px, 40vw, 560px);
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,255,255,0.04);
      line-height: 1;
      user-select: none;
      pointer-events: none;
      letter-spacing: -0.02em;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      white-space: nowrap;
    }

    .e404-content {
      position: relative;
      z-index: 2;
      max-width: 480px;
    }

    .e404-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.7s cubic-bezier(0.25,1,0.5,1) 0.2s forwards;
    }

    .e404-heading {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 700;
      line-height: 1.05;
      color: var(--text);
      margin-bottom: 20px;
      letter-spacing: -0.02em;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.7s cubic-bezier(0.25,1,0.5,1) 0.35s forwards;
    }

    .e404-heading span {
      color: var(--accent);
    }

    .e404-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: var(--text-secondary);
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.7s cubic-bezier(0.25,1,0.5,1) 0.5s forwards;
    }

    .e404-actions {
      display: flex;
      gap: 24px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.7s cubic-bezier(0.25,1,0.5,1) 0.65s forwards;
    }

    /* Primary button — matches hero-cta exactly */
    .e404-btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 999px;
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
    }

    .e404-btn-primary svg {
      width: 14px;
      height: 14px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .e404-btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(240, 137, 50, 0.4);
    }

    /* Secondary button — ghost style, matches statements-cta */
    .e404-btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 999px;
      transition: border-color 0.3s ease, background 0.3s ease, transform 0.3s ease, box-shadow 0.35s ease;
    }

    .e404-btn-secondary:hover {
      border-color: var(--accent);
      background: rgba(240, 137, 50, 0.08);
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(240, 137, 50, 0.15);
    }

    .e404-divider {
      width: 40px;
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 56px auto 0;
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.25,1,0.5,1) 0.8s forwards;
    }

    .e404-nav-links {
      display: flex;
      gap: 32px;
      justify-content: center;
      margin-top: 24px;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.25,1,0.5,1) 0.9s forwards;
    }

    .e404-nav-links a {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.3s ease;
    }

    .e404-nav-links a:hover {
      color: var(--accent);
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor" aria-hidden="true"></div>

  <!-- Background canvases — dot pattern + fluid mouse interaction -->
  <canvas id="dot-pattern" aria-hidden="true"></canvas>
  <canvas id="fluid-canvas" aria-hidden="true"></canvas>

  <!-- ── Navigation ── -->
  <nav class="nav" aria-label="Main navigation">
    <a href="index.html" class="nav-logo hoverable" aria-label="Back to Stoeffel-Media">
      <img src="img/logo.svg" alt="Stoeffel-Media" height="28" />
    </a>
    <div></div>
    <div></div>
    <button class="nav-menu-btn hoverable" onclick="window.location.href='index.html'" aria-label="Go to homepage">
      Home
      <div class="hamburger" aria-hidden="true"><span></span><span></span></div>
    </button>
  </nav>

  <!-- ── 404 Content ── -->
  <main class="e404-page" aria-labelledby="e404-heading">

    <div class="e404-bg-number" aria-hidden="true">404</div>

    <div class="e404-content">
      <div class="e404-label">Error 404</div>

      <h1 class="e404-heading" id="e404-heading">
        This page<br>doesn't <span>exist.</span>
      </h1>

      <p class="e404-text">
        The URL might be wrong, the page may have moved,
        or it never existed in the first place. Either way,
        let's get you back on track.
      </p>

      <div class="e404-actions">
        <a href="index.html" class="e404-btn-primary hoverable">
          Go to Homepage
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
        <a href="index.html#contact" class="e404-btn-secondary hoverable">
          Contact us
        </a>
      </div>

      <div class="e404-divider" aria-hidden="true"></div>

      <nav class="e404-nav-links" aria-label="Quick navigation">
        <a href="index.html#services" class="hoverable">Services</a>
        <a href="index.html#portfolio" class="hoverable">Work</a>
        <a href="index.html#about" class="hoverable">About</a>
      </nav>
    </div>

  </main>

  <script src="js/main.js" defer></script>
</body>
</html>
